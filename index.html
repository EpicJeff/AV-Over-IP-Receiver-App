<!DOCTYPE html>
<html>
<head>
  <title>AI Media Tracker Cast Receiver</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
    }
    #videoElement {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      z-index: 10;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
  </style>
  
  <!-- Google Cast Receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  
  <!-- mpegts.js for Low Latency MSE Playback -->
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
</head>
<body>
  <div id="status">Waiting for AI Media Tracker...</div>
  <video id="videoElement" autoplay muted></video>

  <script>
    const statusEl = document.getElementById('status');
    const videoElement = document.getElementById('videoElement');
    let mpegtsPlayer = null;

    // 1. Initialize Google Cast framework
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // 2. Setup Custom Messaging Channel
    const CUSTOM_CHANNEL = 'urn:x-cast:com.ai_media_tracker';
    context.addCustomMessageListener(CUSTOM_CHANNEL, (customEvent) => {
      const data = customEvent.data;
      if (data && data.type === 'connect' && data.ws_url) {
        statusEl.innerText = "Connecting to HA Stream...";
        startStream(data.ws_url);
      }
    });

    // Intercept LOAD request to prevent native HLS buffering
    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, async loadRequestData => {
      return null; // prevent native playback
    });

    function startStream(wsUrl) {
      if (mpegts.getFeatureList().mseLivePlayback) {
        if (mpegtsPlayer) {
          mpegtsPlayer.destroy();
        }
        
        mpegtsPlayer = mpegts.createPlayer({
          type: 'mse',
          isLive: true,
          url: wsUrl
        }, {
          enableStashBuffer: false,
          liveBufferLatencyChasing: true,
          liveBufferLatencyMaxLatency: 1.5,
          liveBufferLatencyMinRemain: 0.3
        });
        
        mpegtsPlayer.attachMediaElement(videoElement);
        mpegtsPlayer.load();
        
        mpegtsPlayer.on(mpegts.Events.ERROR, (err) => {
          console.error("MPEG-TS Error:", err);
          statusEl.innerText = "Stream Error. Attempting to reconnect...";
          setTimeout(() => mpegtsPlayer.load(), 2000);
        });
        
        videoElement.addEventListener('playing', () => {
          statusEl.style.display = 'none';
        });
        
        videoElement.muted = false;
        let playPromise = videoElement.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.log("Autoplay prevented:", error);
            videoElement.muted = true;
            videoElement.play();
          });
        }
      } else {
        statusEl.innerText = "Your browser does not support MSE.";
      }
    }

    // Start the Cast Receiver
    context.start({
      disableIdleTimeout: true // Prevent TV from sleeping while watching
    });
  </script>
</body>
</html>
